<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Cuerpo grande y redondo -->
  <circle cx="50" cy="56" r="36" fill="#2B2B2B"/>
  <!-- Vientre -->
  <ellipse cx="50" cy="66" rx="22" ry="18" fill="#444"/>
  <!-- Cabeza -->
  <circle cx="50" cy="32" r="22" fill="#2B2B2B"/>
  <!-- Pluma cima -->
  <ellipse cx="50" cy="11" rx="4" ry="9" fill="#1a1a1a" transform="rotate(-10,50,11)"/>
  <!-- Cejas enojadas -->
  <rect x="30" y="22" width="14" height="4" rx="2" fill="#111" transform="rotate(-20,37,24)"/>
  <rect x="56" y="22" width="14" height="4" rx="2" fill="#111" transform="rotate(20,63,24)"/>
  <!-- Ojos blancos -->
  <ellipse cx="40" cy="30" rx="8" ry="9" fill="#fff"/>
  <ellipse cx="60" cy="30" rx="8" ry="9" fill="#fff"/>
  <!-- Pupilas -->
  <circle cx="42" cy="32" r="4" fill="#1a1a1a"/>
  <circle cx="62" cy="32" r="4" fill="#1a1a1a"/>
  <!-- Brillo -->
  <circle cx="44" cy="30" r="1.5" fill="#fff"/>
  <circle cx="64" cy="30" r="1.5" fill="#fff"/>
  <!-- Pico -->
  <polygon points="44,38 56,38 50,46" fill="#F5A623"/>
  <polygon points="44,38 56,38 50,42" fill="#E8901A"/>
  <!-- Mecha bomba -->
  <line x1="50" y1="10" x2="54" y2="2" stroke="#888" stroke-width="2"/>
  <circle cx="54" cy="2" r="3" fill="#FFCC00"/>
</svg>
